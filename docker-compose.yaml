services:
  spot-ros2:
    build:
      context: .
      dockerfile: Dockerfile.spot-ros2
    volumes:
      - .:/home/spot-teleop
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    working_dir: /home/spot-teleop/spot-ros2_ws
    runtime: nvidia
    gpus: all
    privileged: true
    environment:
      - SPOT_NAME=${SPOT_NAME:-Spot}
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=8
      - HOME=/home/spot-teleop
      - USER=root
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - NVIDIA_DRIVER_CAPABILITIES=all
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        echo 'Setting up rosdep...' &&
        rosdep init || echo 'rosdep already initialized' &&
        rosdep update &&
        echo 'Updating package lists...' &&
        apt-get update &&
        echo 'Installing dependencies...' &&
        rosdep install --from-paths src --ignore-src -r -y --rosdistro humble &&
        if [ -f /home/spot-teleop/spot-ros2_ws/install/setup.bash ]; then
          echo 'Found existing build, sourcing setup...' &&
          source /home/spot-teleop/spot-ros2_ws/install/setup.bash
        else
          echo 'No existing build found. You can build manually with: colcon build --symlink-install'
        fi &&
        echo 'Spot ROS2 container ready. ROS_DOMAIN_ID: 8' &&
        echo 'Build manually with: colcon build --symlink-install' &&
        exec bash
      "
    stdin_open: true
    tty: true
    network_mode: host
    ipc: host

  zed:
    build:
      context: .
      dockerfile: Dockerfile.zed
    container_name: zed-container
    gpus: all
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=8
      - NVIDIA_DRIVER_CAPABILITIES=all
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - ./zed_ws:/home/spot-teleop/zed_ws
    working_dir: /home/spot-teleop/zed_ws
    network_mode: host
    ipc: host
    privileged: true
    tty: true
    stdin_open: true
    command: >
      bash -c "
        source /opt/ros/humble/setup.bash &&
        echo 'Setting up rosdep...' &&
        rosdep init || echo 'rosdep already initialized' &&
        rosdep update &&
        echo 'Updating package lists...' &&
        apt-get update &&
        echo 'Installing dependencies...' &&
        rosdep install --from-paths src --ignore-src -r -y --rosdistro humble &&
        echo 'ZED workspace setup...' &&
        if [ -f /home/spot-teleop/zed_ws/install/setup.bash ]; then
          echo 'Found existing build, sourcing setup...' &&
          source /home/spot-teleop/zed_ws/install/setup.bash
        else
          echo 'No existing build found. You can build manually with: colcon build --symlink-install'
        fi &&
        echo 'ZED container ready. ROS_DOMAIN_ID: 8' &&
        echo 'Build manually with: colcon build --symlink-install' &&
        exec bash
      "

  isaac-ros:
    build:
      context: .
      dockerfile: Dockerfile.isaac-ros
    container_name: isaac-ros-container
    runtime: nvidia
    gpus: all
    privileged: true
    network_mode: host
    ipc: host
    environment:
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ROS_DOMAIN_ID=8
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ISAAC_ROS_WS=/workspaces/isaac_ros-dev
      - USERNAME=admin
      - HOST_USER_UID=1000
      - HOST_USER_GID=1000
    volumes:
      # X11 for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ~/.Xauthority:/home/admin/.Xauthority:rw
      # local workspace
      - ./isaac-ros_ws:/workspaces/isaac_ros-dev:rw
      # Hardware devices
      - /dev:/dev
      - /run/udev:/run/udev:ro
      # timezone
      - /etc/localtime:/etc/localtime:ro
    device_cgroup_rules:
      - 'c 81:* rmw' # cameras (/dev/video*)
      - 'c 240:* rmw' # IMU HID (/dev/hidraw*)
      - 'c 504:* rmw' # IIO sensors (/dev/iio:device*)
    working_dir: /workspaces/isaac_ros-dev
    stdin_open: true
    tty: true
    entrypoint: /usr/local/bin/scripts/workspace-entrypoint.sh
    command: /bin/bash

  vllm-server:
    image: docker.io/qwenllm/qwenvl:qwen3vl-cu128
    container_name: qwen_server
    runtime: nvidia
    gpus: all
    privileged: true
    ipc: host
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN}
      - VLLM_NO_USAGE_STATS=1
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8000:8000"
    command: >
      python3 -m vllm.entrypoints.openai.api_server --model Qwen/Qwen3-VL-4B-Instruct --gpu-memory-utilization 0.4 --max-model-len 8192 --trust-remote-code --limit-mm-per-prompt '{"image": 4, "video": 1}'
